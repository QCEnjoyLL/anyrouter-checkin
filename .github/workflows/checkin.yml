name: AnyRouter 自动签到

on:
  schedule:
    # 北京时间(UTC+8) 早 08:00 与 晚 20:00 各一次 → 对应 UTC 00:00 / 12:00
    # 注：GitHub Actions 定时任务常有几分钟~十几分钟延迟，属正常现象；重复签到无副作用
    - cron: '0 0,12 * * *'
  workflow_dispatch: {}   # 支持手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 运行签到
        env:
          # 在仓库 Settings → Secrets and variables → Actions 里添加名为 ANYROUTER_ACCOUNTS 的 secret，
          # 值为 JSON 数组，例如：[{"name":"主号","session":"xxx","user_id":12345}]
          ANYROUTER_ACCOUNTS: ${{ secrets.ANYROUTER_ACCOUNTS }}
          # 以下通知为可选，按需在 Secrets 里配置
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          BARK_URL: ${{ secrets.BARK_URL }}
          SC_KEY: ${{ secrets.SC_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: node checkin.js
